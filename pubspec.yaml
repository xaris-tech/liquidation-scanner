name: liquidation_scanner
description: "Liquidation Receipt Scanner - Scan, summarize, and audit receipts on-the-go."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Local Database
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  
  # Image/Camera
  image_picker: ^1.1.2
  camera: ^0.11.1
  
  # Fonts
  google_fonts: ^6.2.1
  
  # PDF Generation
  pdf: ^3.11.2
  printing: ^5.14.2
  
  # Charts
  fl_chart: ^0.70.2
  
  # Share/Export
  share_plus: ^10.1.4
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Supabase
  supabase_flutter: ^2.8.0
  
  # HTTP
  http: ^1.4.0
  flutter_dotenv: ^5.2.1
  
  # AI/ML
  google_mlkit_text_recognition: ^0.15.1
  flutter_ocr_kit:
    git:
      url: https://github.com/robert008/flutter_ocr_kit.git
  ffi: ^2.1.3
  
  # Document Scanner
  cunning_document_scanner: ^1.4.0
  
  # Image Processing
  image: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Drift code generation
  drift_dev: ^2.26.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - .env
